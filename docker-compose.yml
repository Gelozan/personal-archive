# docker-compose.yml (локальная разработка)
services:
  postgres:
    image: postgres:16-alpine
    container_name: pa_postgres
    env_file: ./infrastructure/env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pa_network

  backend:
    build: ./backend
    container_name: pa_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - pa_network

  # Frontend запускается локально через pnpm dev (не в Docker)
  # для удобства hot reload

volumes:
  postgres_data:

networks:
  pa_network:
    driver: bridge
